<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{cms/cms_layout}">
<body>
<main layout:fragment="content" th:with="pageTitle=${tier.id} ? 'Edit Tier' : 'New Tier'">
    <div class="mx-auto max-w-6xl space-y-8">

        <!-- Page Header -->
        <div class="flex items-end justify-between">
            <div>
                <h1 class="font-display text-3xl uppercase text-rev-ink" th:text="${tier.id} ? 'Edit Tier' : 'New Tier'">New Tier</h1>
            </div>
            <a th:href="@{/admin/cms/donations}" href="/admin/cms/donations" class="outline-btn no-underline">← Back to Donations</a>
        </div>

        <!-- flash banners removed: using toast notifications -->

        <form th:action="${tier.id} ? @{/admin/cms/donations/tiers/{id}/edit(id=${tier.id})} : @{/admin/cms/donations/tiers/new}"
              method="post" th:object="${tier}" data-spinner>
            <div class="space-y-8">
                <div class="rounded-xl border border-rev-border bg-rev-surface p-6 space-y-4">
                    <h3 class="font-display text-lg uppercase text-rev-ink">Donation Tier</h3>
                    <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
                        <div>
                            <label class="mono-label block mb-2">Amount (₦)</label>
                            <input type="text" th:field="*{amount}" placeholder="5,000"
                                   class="w-full rounded-md border border-rev-border bg-rev-subtle px-3 py-2 text-sm outline-none focus:border-rev-red">
                        </div>
                        <div>
                            <label class="mono-label block mb-2">Tier name</label>
                            <input type="text" th:field="*{tierName}" placeholder="Sustainer"
                                   class="w-full rounded-md border border-rev-border bg-rev-subtle px-3 py-2 text-sm outline-none focus:border-rev-red">
                        </div>
                    </div>
                    <div>
                        <label class="mono-label block mb-2">What it funds</label>
                        <input type="text" th:field="*{description}" placeholder="e.g. One week of newspaper printing"
                               class="w-full rounded-md border border-rev-border bg-rev-subtle px-3 py-2 text-sm outline-none focus:border-rev-red">
                    </div>
                    <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
                        <div>
                            <label class="mono-label block mb-2">Recurring?</label>
                            <select th:field="*{recurring}"
                                    class="w-full rounded-md border border-rev-border bg-rev-subtle px-3 py-2 text-sm outline-none focus:border-rev-red">
                                <option value="">— Select —</option>
                                <option value="false">No — one-time</option>
                                <option value="true">Yes — monthly</option>
                            </select>
                        </div>
                        <div>
                            <label class="mono-label block mb-2">Sort order (optional)</label>
                            <input type="number" th:field="*{sortOrder}" placeholder="Lower numbers appear first"
                                   class="w-full rounded-md border border-rev-border bg-rev-subtle px-3 py-2 text-sm outline-none focus:border-rev-red">
                        </div>
                    </div>
                </div>

                <!-- Save buttons -->
                <div class="flex justify-end gap-3">
                    <a th:href="@{/admin/cms/donations}" href="/admin/cms/donations" class="outline-btn no-underline">Cancel</a>
                    <button type="submit" class="red-btn">Save Tier</button>
                </div>
            </div>
        </form>

    </div>
</main>
</body>
</html>
