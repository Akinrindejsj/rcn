<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{cms/cms_layout}">
<body>
<main layout:fragment="content" th:with="pageTitle=${edit} ? 'Edit Activity Report' : 'New Activity Report'">
    <div class="mx-auto max-w-6xl space-y-8">

        <!-- Page Header -->
        <div class="flex items-end justify-between">
            <div>
                <h1 class="font-display text-3xl uppercase text-rev-ink" th:text="${edit} ? 'Edit Activity Report' : 'New Activity Report'">New Activity Report</h1>
                <p class="mt-1 text-sm text-rev-muted" th:if="${edit} and ${activity.title}" th:text="'Editing: ' + ${activity.title}">Editing</p>
            </div>
            <a th:href="@{/admin/cms/events}" href="/admin/cms/events" class="outline-btn no-underline">← Back to Reports</a>
        </div>

        <!-- flash banners removed: centralized toast notifications will display messages -->

        <form th:action="${edit} ? @{/admin/cms/events/{id}/edit(id=${activity.id})} : @{/admin/cms/events/new}"
              method="post" enctype="multipart/form-data" th:object="${activity}" data-spinner>
            <div class="grid grid-cols-1 gap-8 lg:grid-cols-3">
                <!-- Main column -->
                <div class="space-y-6 lg:col-span-2">

                    <div class="rounded-xl border border-rev-border bg-rev-surface p-6">
                        <label class="mono-label block mb-2">Report title</label>
                        <input type="text" th:field="*{title}" placeholder="A short, descriptive headline"
                               class="w-full rounded-md border border-rev-border bg-rev-subtle px-4 py-3 text-lg font-medium outline-none focus:border-rev-red focus:bg-rev-surface">
                    </div>

                    <div class="rounded-xl border border-rev-border bg-rev-surface p-6">
                        <label class="mono-label block mb-2">Report details</label>
                        <textarea rows="10" th:field="*{body}" placeholder="Describe what happened, where, and what it means for the movement."
                                  class="w-full resize-y rounded-md border border-rev-border bg-rev-subtle px-4 py-3 text-sm leading-relaxed outline-none focus:border-rev-red focus:bg-rev-surface"></textarea>
                        <p class="text-xs text-rev-muted mt-2">Describe what happened, where, and what it means for the movement.</p>
                    </div>

                    <!-- Photo -->
                    <div class="rounded-xl border border-rev-border bg-rev-surface p-6 space-y-3">
                        <label class="mono-label block">Photo</label>
                        <div class="rounded-md overflow-hidden border border-rev-border bg-rev-subtle">
                            <img th:if="${activity.imageUrl != null and !activity.imageUrl.isBlank()}"
                                 th:src="${activity.imageUrl}" alt="Report photo"
                                 class="w-full h-48 object-cover"
                                 onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                            <div class="img-placeholder h-48 w-full"
                                 th:classappend="${activity.imageUrl != null and !activity.imageUrl.isBlank() ? ' hidden' : ''}">
                                <span class="ph-label">Upload a photo — 800×500 px, max 5 MB</span>
                            </div>
                        </div>
                        <input type="file" name="image" class="rcn-upload w-full text-sm text-rev-muted" data-max-size="5242880" data-accept="image/" accept="image/jpeg,image/png,image/webp">
                    </div>
                </div>

                <!-- Sidebar -->
                <div class="space-y-6">
                    <div class="rounded-xl border border-rev-border bg-rev-surface p-6 space-y-4">
                        <h3 class="font-display text-lg uppercase text-rev-ink">Details</h3>
                        <div>
                            <label class="mono-label block mb-2">Location (City)</label>
                            <input type="text" th:field="*{location}" placeholder="e.g. Lagos"
                                   class="w-full rounded-md border border-rev-border bg-rev-subtle px-3 py-2 text-sm outline-none focus:border-rev-red">
                        </div>
                        <div>
                            <label class="mono-label block mb-2">Date</label>
                            <input type="date" th:field="*{activityDate}"
                                   class="w-full rounded-md border border-rev-border bg-rev-subtle px-3 py-2 text-sm outline-none focus:border-rev-red">
                        </div>
                        <div>
                            <label class="mono-label block mb-2">Type</label>
                            <select th:field="*{type}"
                                    class="w-full rounded-md border border-rev-border bg-rev-subtle px-3 py-2 text-sm outline-none focus:border-rev-red">
                                <option value="">— Select type —</option>
                                <option value="Street Tabling">Street Tabling</option>
                                <option value="Protest">Protest</option>
                                <option value="Study Circle">Study Circle</option>
                                <option value="Public Meeting">Public Meeting</option>
                                <option value="Campus">Campus</option>
                                <option value="Rally">Rally</option>
                            </select>
                        </div>
                        <div>
                            <label class="mono-label block mb-2">Author (reporting comrade)</label>
                            <input type="text" th:field="*{authorName}" placeholder="e.g. Amaka T."
                                   class="w-full rounded-md border border-rev-border bg-rev-subtle px-3 py-2 text-sm outline-none focus:border-rev-red">
                        </div>
                        <div class="flex gap-3 pt-2">
                            <button type="submit" class="red-btn flex-1">Save</button>
                            <a th:href="@{/admin/cms/events}" href="/admin/cms/events" class="outline-btn flex-1 text-center no-underline">Cancel</a>
                        </div>
                    </div>
                </div>
            </div>
        </form>

    </div>
</main>
</body>
</html>
