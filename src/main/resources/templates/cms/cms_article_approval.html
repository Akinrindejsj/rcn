<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{cms/cms_layout}">
<body>
<main layout:fragment="content" th:with="pageTitle='Approval Queue'">
    <div class="mx-auto max-w-6xl space-y-8">

        <!-- Page Header -->
        <div class="flex items-end justify-between">
            <div>
                <h1 class="font-display text-3xl uppercase text-rev-ink">Approval Queue</h1>
                <p class="mt-1 text-sm text-rev-muted">Articles submitted by comrades awaiting editorial review before publication.</p>
            </div>
            <span class="rounded-full bg-rev-red-light px-3 py-1 text-xs font-medium text-rev-red"
                  th:text="${#lists.size(pendingArticles)} + ' awaiting review'">0 awaiting review</span>
        </div>

        <!-- Flash banners -->
        <div th:if="${successMessage}"
             id="successBanner"
             class="bg-emerald-600 text-white rounded-xl px-5 py-4 flex items-start gap-3 shadow-sm">
            <iconify-icon icon="lucide:check-circle-2" width="22" height="22" stroke-width="2" class="mt-0.5 flex-shrink-0"></iconify-icon>
            <div class="flex-1">
                <p class="font-medium text-sm" th:text="${successMessage}">Done.</p>
            </div>
            <button onclick="document.getElementById('successBanner').remove()"
                    class="text-white/80 hover:text-white transition-colors flex-shrink-0">
                <iconify-icon icon="lucide:x" width="18" height="18" stroke-width="2"></iconify-icon>
            </button>
        </div>
        <script th:if="${successMessage}">
            setTimeout(function () {
                var el = document.getElementById('successBanner');
                if (el) el.remove();
            }, 4000);
        </script>

        <div th:if="${errorMessage}"
             class="bg-red-600 text-white rounded-xl px-5 py-4 flex items-start gap-3 shadow-sm">
            <iconify-icon icon="lucide:x-circle" width="22" height="22" stroke-width="2" class="mt-0.5 flex-shrink-0"></iconify-icon>
            <div class="flex-1">
                <p class="font-medium text-sm" th:text="${errorMessage}">Something went wrong.</p>
            </div>
            <button onclick="this.parentElement.remove()" class="text-white/80 hover:text-white transition-colors flex-shrink-0">
                <iconify-icon icon="lucide:x" width="18" height="18" stroke-width="2"></iconify-icon>
            </button>
        </div>

        <!-- Empty state -->
        <div th:if="${#lists.isEmpty(pendingArticles)}"
             class="rounded-xl border border-rev-border bg-rev-surface p-12 text-center">
            <iconify-icon icon="lucide:clipboard-check" width="48" height="48" stroke-width="1" class="text-rev-muted"></iconify-icon>
            <p class="mt-4 text-rev-muted">Nothing to review. The queue is clear.</p>
        </div>

        <!-- Queue Table -->
        <div th:if="${!#lists.isEmpty(pendingArticles)}" class="rounded-xl border border-rev-border bg-rev-surface shadow-sm">
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm">
                    <thead class="bg-rev-subtle text-xs uppercase text-rev-muted border-b border-rev-border">
                    <tr>
                        <th class="px-6 py-3 font-medium font-mono">Title</th>
                        <th class="px-6 py-3 font-medium font-mono">Submitted by</th>
                        <th class="px-6 py-3 font-medium font-mono">Category</th>
                        <th class="px-6 py-3 font-medium font-mono">Submitted</th>
                        <th class="px-6 py-3 font-medium font-mono">Type</th>
                        <th class="px-6 py-3 font-medium font-mono"></th>
                    </tr>
                    </thead>
                    <tbody class="divide-y divide-rev-border">
                    <tr th:each="article : ${pendingArticles}" class="article-row group hover:bg-rev-subtle/50">
                        <td class="px-6 py-4">
                            <div class="font-medium text-rev-ink" th:text="${article.title}">Title</div>
                            <div class="text-xs text-rev-muted mt-1 line-clamp-1" th:text="${article.excerpt ?: #strings.abbreviate(article.body ?: '', 120)}">Excerpt</div>
                        </td>
                        <td class="px-6 py-4">
                            <div class="flex items-center gap-2">
                                <div class="h-6 w-6 rounded-full bg-rev-red flex items-center justify-center text-white text-[10px] font-bold"
                                     th:text="${#strings.substring(article.authorName ?: '??', 0, 2)}">??</div>
                                <span class="text-rev-ink" th:text="${article.authorName ?: 'Anonymous'}">Author</span>
                            </div>
                        </td>
                        <td class="px-6 py-4 text-rev-muted" th:text="${article.category ?: '—'}">Category</td>
                        <td class="px-6 py-4 text-rev-muted"
                            th:text="${article.createdAt != null ? #temporals.format(article.createdAt, 'MMM d, yyyy') : '—'}">Date</td>
                        <td class="px-6 py-4">
                            <span class="inline-flex items-center rounded-full bg-rev-subtle px-2 py-1 text-xs font-medium text-rev-muted ring-1 ring-inset ring-rev-border"
                                  th:text="${article.articleType != null ? article.articleType.name() : '—'}">Type</span>
                        </td>
                        <td class="px-6 py-4 text-right whitespace-nowrap">
                            <a th:href="@{|/admin/cms/articles/${article.id}/edit|}"
                               class="text-rev-muted hover:text-red-700 font-mono text-xs uppercase tracking-widest mr-3">Review</a>
                            <form method="post" th:action="@{|/admin/cms/approval/${article.id}/publish|}" class="inline"
                                  onsubmit="return confirm('Approve and publish this article?');">
                                <button type="submit" class="text-rev-muted hover:text-red-700 font-mono text-xs uppercase tracking-widest mr-3">Approve</button>
                            </form>
                            <form method="post" th:action="@{|/admin/cms/approval/${article.id}/reject|}" class="inline"
                                  onsubmit="return confirm('Reject this article?');">
                                <button type="submit" class="text-rev-muted hover:text-red-700 font-mono text-xs uppercase tracking-widest">Reject</button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
            <div class="border-t border-rev-border px-6 py-4">
                <div class="flex items-center justify-between">
                    <span class="text-xs text-rev-muted"
                          th:text="'All ' + ${#lists.size(pendingArticles)} + ' items shown'">All items shown</span>
                </div>
            </div>
        </div>

    </div>
</main>
</body>
</html>
