<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{cms/cms_layout}">
<body>
<main layout:fragment="content" th:with="pageTitle='Media Library'">
    <div class="mx-auto max-w-6xl space-y-8">

        <!-- Page Header -->
        <div class="flex items-end justify-between">
            <div>
                <h1 class="font-display text-3xl uppercase text-rev-ink">Media Library</h1>
                <p class="mt-1 text-sm text-rev-muted">All uploaded images and documents.</p>
            </div>
        </div>

        <!-- flash banners removed: handled by toast system in layout -->

        <!-- Upload form -->
        <div class="rounded-xl border border-rev-border bg-rev-surface p-6 space-y-4">
            <h3 class="font-display text-lg uppercase text-rev-ink">Upload a File</h3>
            <form th:action="@{/admin/cms/media/upload}" method="post" enctype="multipart/form-data" class="flex flex-wrap items-end gap-4">
                <div class="flex-1 min-w-[200px]">
                    <label class="mono-label block mb-2">Choose file</label>
                    <input type="file" name="file" accept="image/jpeg,image/png,image/webp" required
                           class="rcn-upload w-full text-sm text-rev-muted file:mr-3 file:rounded-md file:border-0 file:bg-rev-red file:text-white file:font-mono file:text-xs file:uppercase file:tracking-widest file:px-4 file:py-2 hover:file:bg-rev-red-dark file:cursor-pointer cursor-pointer"
                           data-max-size="20971520" />
                </div>
                <div class="w-48">
                    <label class="mono-label block mb-2">Uploaded by</label>
                    <input type="text" name="uploadedBy" placeholder="Your name" value="cms"
                           class="w-full rounded-md border border-rev-border bg-rev-subtle px-3 py-2 text-sm outline-none focus:border-rev-red">
                </div>
                <button type="submit" class="red-btn">Upload</button>
            </form>
        </div>

        <!-- Count -->
        <div class="flex items-center justify-between">
            <span class="mono-label" th:text="${#lists.size(files)} + ' files'">0 files</span>
        </div>

        <!-- Empty state -->
        <div th:if="${#lists.isEmpty(files)}"
             class="rounded-xl border border-rev-border bg-rev-surface p-12 text-center">
            <iconify-icon icon="lucide:folder-open" width="48" height="48" stroke-width="1" class="text-rev-muted"></iconify-icon>
            <p class="mt-4 text-rev-muted">No files uploaded yet. Use the form above to upload the first one.</p>
        </div>

        <!-- Media grid -->
        <div th:if="${!#lists.isEmpty(files)}" class="grid grid-cols-2 gap-4 md:grid-cols-3 lg:grid-cols-4">
            <div th:each="f : ${files}" class="rounded-xl border border-rev-border bg-rev-surface overflow-hidden group">
                <div class="h-36 w-full bg-rev-subtle overflow-hidden">
                    <img th:if="${f.cloudinaryUrl != null}" th:src="${f.cloudinaryUrl}" th:alt="${f.fileName}"
                         class="w-full h-full object-cover"
                         onerror="this.parentElement.innerHTML='<div class=\'img-placeholder h-full w-full\'><span class=\'ph-label\'>' + (this.alt || 'File') + '</span></div>'">
                    <div th:if="${f.cloudinaryUrl == null}" class="img-placeholder h-full w-full">
                        <span class="ph-label" th:text="${f.fileName}">File</span>
                    </div>
                </div>
                <div class="p-3">
                    <p class="truncate text-sm font-medium text-rev-ink" th:text="${f.fileName}">filename.jpg</p>
                    <p class="text-xs text-rev-muted">
                        <span th:if="${f.bytes != null}" th:text="${#numbers.formatDecimal(f.bytes / 1024.0, 1, 1)} + ' KB'">0 KB</span>
                        <span th:if="${f.uploadedAt != null}" th:text="' · ' + ${#temporals.format(f.uploadedAt, 'MMM d, yyyy')}">Date</span>
                    </p>
                    <div class="mt-2 flex gap-3">
                        <button type="button" class="text-xs text-rev-muted hover:text-red-700 font-mono uppercase tracking-widest"
                                th:attr="data-action=@{/admin/cms/media/{id}/delete(id=${f.id})}, data-name=${f.fileName}"
                                onclick="openDeleteModal(this.dataset.action, this.dataset.name)">Delete</button>
                    </div>
                </div>
            </div>
        </div>

    </div>
</main>
</body>
</html>
