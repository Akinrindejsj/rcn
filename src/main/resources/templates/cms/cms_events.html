<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{cms/cms_layout}">
<body>
<main layout:fragment="content" th:with="pageTitle='Events'">
    <div class="mx-auto max-w-6xl space-y-8">

        <!-- Page Header -->
        <div class="flex items-end justify-between">
            <div>
                <h1 class="font-display text-3xl uppercase text-rev-ink">Activity Reports</h1>
                <p class="mt-1 text-sm text-rev-muted">On-the-ground reports from RCN cells — protests, tabling, study circles, rallies.</p>
            </div>
            <a th:href="@{/admin/cms/events/new}" href="/admin/cms/events/new" class="red-btn flex items-center gap-2">
                <iconify-icon icon="lucide:plus" width="16" height="16" stroke-width="1.5"></iconify-icon>
                New Report
            </a>
        </div>

        <!-- Flash banners -->
        <div th:if="${successMessage}"
             class="bg-emerald-600 text-white rounded-xl px-5 py-4 flex items-start gap-3 shadow-sm">
            <iconify-icon icon="lucide:check-circle-2" width="22" height="22" stroke-width="2" class="mt-0.5 flex-shrink-0"></iconify-icon>
            <p class="font-medium text-sm flex-1" th:text="${successMessage}">Saved.</p>
        </div>
        <div th:if="${errorMessage}"
             class="bg-red-600 text-white rounded-xl px-5 py-4 flex items-start gap-3 shadow-sm">
            <iconify-icon icon="lucide:x-circle" width="22" height="22" stroke-width="2" class="mt-0.5 flex-shrink-0"></iconify-icon>
            <p class="font-medium text-sm flex-1" th:text="${errorMessage}">Something went wrong.</p>
        </div>

        <!-- Empty state -->
        <div th:if="${#lists.isEmpty(activities)}"
             class="rounded-xl border border-rev-border bg-rev-surface p-12 text-center">
            <iconify-icon icon="lucide:globe" width="48" height="48" stroke-width="1" class="text-rev-muted"></iconify-icon>
            <p class="mt-4 text-rev-muted">No activity reports yet. Click "New Report" to add the first one.</p>
        </div>

        <!-- Reports Table -->
        <div th:if="${!#lists.isEmpty(activities)}" class="rounded-xl border border-rev-border bg-rev-surface shadow-sm">
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm">
                    <thead class="bg-rev-subtle text-xs uppercase text-rev-muted border-b border-rev-border">
                    <tr>
                        <th class="px-6 py-3 font-medium font-mono">Title</th>
                        <th class="px-6 py-3 font-medium font-mono">Location</th>
                        <th class="px-6 py-3 font-medium font-mono">Type</th>
                        <th class="px-6 py-3 font-medium font-mono">Date</th>
                        <th class="px-6 py-3 font-medium font-mono">Author</th>
                        <th class="px-6 py-3 font-medium font-mono"></th>
                    </tr>
                    </thead>
                    <tbody class="divide-y divide-rev-border">
                    <tr th:each="a : ${activities}" class="article-row group hover:bg-rev-subtle/50">
                        <td class="px-6 py-4">
                            <div class="font-medium text-rev-ink" th:text="${a.title}">Title</div>
                            <div class="text-xs text-rev-muted line-clamp-1" th:if="${a.body}" th:text="${a.body}">Body</div>
                        </td>
                        <td class="px-6 py-4 text-rev-ink" th:text="${a.location} ?: '—'">Location</td>
                        <td class="px-6 py-4">
                            <span class="inline-flex items-center rounded-full bg-rev-red-light px-2 py-1 text-xs font-medium text-rev-red"
                                  th:text="${a.type} ?: 'Report'">Type</span>
                        </td>
                        <td class="px-6 py-4 text-rev-muted" th:text="${a.activityDate != null ? #temporals.format(a.activityDate, 'MMM d, yyyy') : '—'}">Date</td>
                        <td class="px-6 py-4 text-rev-muted" th:text="${a.authorName} ?: '—'">Author</td>
                        <td class="px-6 py-4 text-right whitespace-nowrap">
                            <a th:href="@{/admin/cms/events/{id}/edit(id=${a.id})}" class="text-rev-muted hover:text-red-700 font-mono text-xs uppercase tracking-widest mr-3">Edit</a>
                            <form method="post" th:action="@{/admin/cms/events/{id}/delete(id=${a.id})}" class="inline"
                                  onsubmit="return confirm('Delete this report? This cannot be undone.')">
                                <button type="submit" class="text-rev-muted hover:text-red-700 font-mono text-xs uppercase tracking-widest">Delete</button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
            <div class="border-t border-rev-border px-6 py-4">
                <div class="flex items-center justify-between">
                    <span class="text-xs text-rev-muted" th:text="${#lists.size(activities)} + ' reports'">0 reports</span>
                </div>
            </div>
        </div>

    </div>
</main>
</body>
</html>
