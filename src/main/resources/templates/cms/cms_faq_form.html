<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{cms/cms_layout}">
<body>
<main layout:fragment="content" th:with="pageTitle=${faq.id} ? 'Edit FAQ' : 'New FAQ'">
    <div class="mx-auto max-w-6xl space-y-8">

        <!-- Page Header -->
        <div class="flex items-end justify-between">
            <div>
                <h1 class="font-display text-3xl uppercase text-rev-ink" th:text="${faq.id} ? 'Edit FAQ' : 'New FAQ'">New FAQ</h1>
                <p class="mt-1 text-sm text-rev-muted" th:if="${faq.id}">Editing an existing question.</p>
            </div>
            <a th:href="@{/admin/cms/about}" href="/admin/cms/about" class="outline-btn no-underline">← Back to About</a>
        </div>

        <!-- Form -->
        <form th:action="${faq.id} ? @{/admin/cms/about/faqs/{id}/edit(id=${faq.id})} : @{/admin/cms/about/faqs/new}"
              method="post" th:object="${faq}" data-spinner>

            <!-- FAQ Content -->
            <div class="rounded-xl border border-rev-border bg-rev-surface p-6 space-y-5">
                <h3 class="font-display text-lg uppercase text-rev-ink">FAQ Details</h3>
                <div>
                    <label class="mono-label block mb-2">Question</label>
                    <input type="text" th:field="*{question}" placeholder="e.g. Is the RCN a political party?"
                           class="w-full rounded-md border border-rev-border bg-rev-subtle px-4 py-2 text-sm outline-none focus:border-rev-red">
                    <p class="text-xs text-rev-muted mt-1">Write the question as it will appear on the site.</p>
                </div>

                <div>
                    <label class="mono-label block mb-2">Answer</label>
                    <textarea rows="6" th:field="*{answer}" placeholder="Write a clear, plain-English answer."
                              class="w-full resize-y rounded-md border border-rev-border bg-rev-subtle px-4 py-3 text-sm leading-relaxed outline-none focus:border-rev-red focus:bg-rev-surface"></textarea>
                    <p class="text-xs text-rev-muted mt-1">Provide a concise, informative answer.</p>
                </div>

                <div>
                    <label class="mono-label block mb-2">Sort order (optional)</label>
                    <input type="number" th:field="*{sortOrder}" placeholder="Lower numbers appear first"
                           class="w-full rounded-md border border-rev-border bg-rev-subtle px-4 py-2 text-sm outline-none focus:border-rev-red">
                    <p class="text-xs text-rev-muted mt-1">If left blank, the question will be added at the end.</p>
                </div>
            </div>

            <!-- Save buttons -->
            <div class="mt-8 flex justify-end gap-3">
                <a th:href="@{/admin/cms/about}" href="/admin/cms/about" class="outline-btn no-underline">Cancel</a>
                <button type="submit" class="red-btn">Save Question</button>
            </div>

        </form>

    </div>
</main>

</body>
</html>
