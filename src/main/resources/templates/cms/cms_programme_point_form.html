<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{cms/cms_layout}">
<body>
<main layout:fragment="content" th:with="pageTitle=${point.id} ? 'Edit Programme Point' : 'New Programme Point'">
    <div class="mx-auto max-w-6xl space-y-8">

        <!-- Page Header -->
        <div class="flex items-end justify-between">
            <div>
                <h1 class="font-display text-3xl uppercase text-rev-ink" th:text="${point.id} ? 'Edit Programme Point' : 'New Programme Point'">New Programme Point</h1>
                <p class="mt-1 text-sm text-rev-muted" th:if="${point.id}">Editing an existing programme point.</p>
            </div>
            <a th:href="@{/admin/cms/about}" href="/admin/cms/about" class="outline-btn no-underline">← Back to About</a>
        </div>

        <!-- Form -->
        <form th:action="${point.id} ? @{/admin/cms/about/programme-points/{id}/edit(id=${point.id})} : @{/admin/cms/about/programme-points/new}"
              method="post" enctype="multipart/form-data" th:object="${point}" data-spinner>

            <!-- Programme Point Details -->
            <div class="rounded-xl border border-rev-border bg-rev-surface p-6 space-y-5">
                <h3 class="font-display text-lg uppercase text-rev-ink">Point Details</h3>
                <div class="grid grid-cols-1 gap-4 md:grid-cols-4">
                    <div>
                        <label class="mono-label block mb-2">Number</label>
                        <input type="text" th:field="*{orderNumber}" placeholder="01"
                               class="w-full rounded-md border border-rev-border bg-rev-subtle px-4 py-2 text-sm outline-none focus:border-rev-red">
                    </div>
                    <div class="md:col-span-3">
                        <label class="mono-label block mb-2">Title</label>
                        <input type="text" th:field="*{pointTitle}" placeholder="e.g. For a Workers' Government"
                               class="w-full rounded-md border border-rev-border bg-rev-subtle px-4 py-2 text-sm outline-none focus:border-rev-red">
                    </div>
                </div>

                <div>
                    <label class="mono-label block mb-2">Description</label>
                    <textarea rows="6" th:field="*{pointDescription}" placeholder="What this point means in practice."
                              class="w-full resize-y rounded-md border border-rev-border bg-rev-subtle px-4 py-3 text-sm leading-relaxed outline-none focus:border-rev-red focus:bg-rev-surface"></textarea>
                    <p class="text-xs text-rev-muted mt-1">A clear, concise explanation of the programme point.</p>
                </div>

                <div>
                    <label class="mono-label block mb-2">Sort order (optional)</label>
                    <input type="number" th:field="*{sortOrder}" placeholder="Lower numbers appear first"
                           class="w-full rounded-md border border-rev-border bg-rev-subtle px-4 py-2 text-sm outline-none focus:border-rev-red">
                    <p class="text-xs text-rev-muted mt-1">If left blank, the point will be added at the end.</p>
                </div>
            </div>

            <!-- Image upload -->
            <div class="mt-8 rounded-xl border border-rev-border bg-rev-surface p-6 space-y-3">
                <label class="mono-label block">Image (optional)</label>
                <div class="rounded-md overflow-hidden border border-rev-border bg-rev-subtle">
                    <img th:if="${point.imageUrl != null and !point.imageUrl.isBlank()}"
                         th:src="${point.imageUrl}" alt="Point image"
                         class="w-full h-48 object-cover"
                         onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                    <div class="img-placeholder h-48 w-full"
                         th:classappend="${point.imageUrl != null and !point.imageUrl.isBlank() ? ' hidden' : ''}">
                        <span class="ph-label">Upload image</span>
                    </div>
                </div>
                <input type="file" name="image" class="rcn-upload w-full text-sm text-rev-muted" data-max-size="5242880" data-accept="image/" accept="image/jpeg,image/png,image/webp,image/svg+xml">
                <p class="text-xs text-rev-muted">Max 5 MB. Upload a relevant image to illustrate this programme point.</p>
            </div>

            <!-- Save buttons -->
            <div class="mt-8 flex justify-end gap-3">
                <a th:href="@{/admin/cms/about}" href="/admin/cms/about" class="outline-btn no-underline">Cancel</a>
                <button type="submit" class="red-btn">Save Point</button>
            </div>

        </form>

    </div>
</main>
</body>
</html>
