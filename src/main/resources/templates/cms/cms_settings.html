<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{cms/cms_layout}">
<body>
<main layout:fragment="content" th:with="pageTitle='Settings'">
    <div class="mx-auto max-w-6xl space-y-8">

        <!-- Page Header -->
        <div class="flex items-end justify-between">
            <div>
                <h1 class="font-display text-3xl uppercase text-rev-ink">Settings</h1>
                <p class="mt-1 text-sm text-rev-muted">Site-wide details: name, contact, social links, and footer text.</p>
            </div>
        </div>

        <!-- Flash banners -->
        <div th:if="${successMessage}"
             class="bg-emerald-600 text-white rounded-xl px-5 py-4 flex items-start gap-3 shadow-sm">
            <iconify-icon icon="lucide:check-circle-2" width="22" height="22" stroke-width="2" class="mt-0.5 flex-shrink-0"></iconify-icon>
            <p class="font-medium text-sm flex-1" th:text="${successMessage}">Saved.</p>
        </div>
        <div th:if="${errorMessage}"
             class="bg-red-600 text-white rounded-xl px-5 py-4 flex items-start gap-3 shadow-sm">
            <iconify-icon icon="lucide:x-circle" width="22" height="22" stroke-width="2" class="mt-0.5 flex-shrink-0"></iconify-icon>
            <p class="font-medium text-sm flex-1" th:text="${errorMessage}">Something went wrong.</p>
        </div>

        <form th:action="@{/admin/cms/settings}" method="post" th:object="${settings}">
            <!-- General -->
            <div class="rounded-xl border border-rev-border bg-rev-surface p-6 space-y-5">
                <h3 class="font-display text-lg uppercase text-rev-ink">General</h3>
                <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
                    <div>
                        <label class="mono-label block mb-2">Site name</label>
                        <input type="text" th:field="*{siteName}" placeholder="Revolutionary Communists of Nigeria"
                               class="w-full rounded-md border border-rev-border bg-rev-subtle px-4 py-2 text-sm outline-none focus:border-rev-red">
                    </div>
                    <div>
                        <label class="mono-label block mb-2">Tagline</label>
                        <input type="text" th:field="*{tagline}" placeholder="Nigerian Section of the Revolutionary Communist International"
                               class="w-full rounded-md border border-rev-border bg-rev-subtle px-4 py-2 text-sm outline-none focus:border-rev-red">
                    </div>
                    <div>
                        <label class="mono-label block mb-2">Contact email</label>
                        <input type="email" th:field="*{contactEmail}" placeholder="contact@rcn.ng"
                               class="w-full rounded-md border border-rev-border bg-rev-subtle px-4 py-2 text-sm outline-none focus:border-rev-red">
                    </div>
                    <div>
                        <label class="mono-label block mb-2">WhatsApp contact</label>
                        <input type="tel" th:field="*{whatsApp}" placeholder="+234 800 000 0000"
                               class="w-full rounded-md border border-rev-border bg-rev-subtle px-4 py-2 text-sm outline-none focus:border-rev-red">
                    </div>
                </div>
            </div>

            <!-- Top banner -->
            <div class="mt-8 rounded-xl border border-rev-border bg-rev-surface p-6 space-y-4">
                <h3 class="font-display text-lg uppercase text-rev-ink">Top Banner</h3>
                <p class="text-xs text-rev-muted">The red bar that appears at the very top of every public page.</p>
                <div>
                    <label class="mono-label block mb-2">Banner text</label>
                    <input type="text" th:field="*{bannerText}" placeholder="Nigerian Section of the RCI · Workers of All Countries, Unite!"
                           class="w-full rounded-md border border-rev-border bg-rev-subtle px-4 py-2 text-sm outline-none focus:border-rev-red">
                </div>
            </div>

            <!-- Social links -->
            <div class="mt-8 rounded-xl border border-rev-border bg-rev-surface p-6 space-y-4">
                <h3 class="font-display text-lg uppercase text-rev-ink">Social Links</h3>
                <p class="text-xs text-rev-muted">Shown in the footer. Leave a field blank to hide that link.</p>
                <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
                    <div>
                        <label class="mono-label block mb-2">X / Twitter URL</label>
                        <input type="url" th:field="*{socialX}" placeholder="https://x.com/rcn_ng"
                               class="w-full rounded-md border border-rev-border bg-rev-subtle px-4 py-2 text-sm outline-none focus:border-rev-red">
                    </div>
                    <div>
                        <label class="mono-label block mb-2">Instagram URL</label>
                        <input type="url" th:field="*{socialInstagram}" placeholder="https://instagram.com/rcn_ng"
                               class="w-full rounded-md border border-rev-border bg-rev-subtle px-4 py-2 text-sm outline-none focus:border-rev-red">
                    </div>
                    <div>
                        <label class="mono-label block mb-2">YouTube URL</label>
                        <input type="url" th:field="*{socialYoutube}" placeholder="https://youtube.com/@rcn_ng"
                               class="w-full rounded-md border border-rev-border bg-rev-subtle px-4 py-2 text-sm outline-none focus:border-rev-red">
                    </div>
                    <div>
                        <label class="mono-label block mb-2">Telegram URL</label>
                        <input type="url" th:field="*{socialTelegram}" placeholder="https://t.me/rcn_ng"
                               class="w-full rounded-md border border-rev-border bg-rev-subtle px-4 py-2 text-sm outline-none focus:border-rev-red">
                    </div>
                    <div>
                        <label class="mono-label block mb-2">marxist.com (RCI)</label>
                        <input type="url" th:field="*{marxistUrl}" placeholder="https://marxist.com"
                               class="w-full rounded-md border border-rev-border bg-rev-subtle px-4 py-2 text-sm outline-none focus:border-rev-red">
                    </div>
                    <div>
                        <label class="mono-label block mb-2">Marxist Books shop</label>
                        <input type="url" th:field="*{booksUrl}" placeholder="https://www.marxistbooks.com/"
                               class="w-full rounded-md border border-rev-border bg-rev-subtle px-4 py-2 text-sm outline-none focus:border-rev-red">
                    </div>
                </div>
            </div>

            <!-- Footer -->
            <div class="mt-8 rounded-xl border border-rev-border bg-rev-surface p-6 space-y-4">
                <h3 class="font-display text-lg uppercase text-rev-ink">Footer</h3>
                <div>
                    <label class="mono-label block mb-2">Footer description</label>
                    <textarea rows="2" th:field="*{footerDescription}" placeholder="About the organisation…"
                              class="w-full resize-y rounded-md border border-rev-border bg-rev-subtle px-4 py-3 text-sm outline-none focus:border-rev-red focus:bg-rev-surface"></textarea>
                </div>
                <div>
                    <label class="mono-label block mb-2">Copyright line</label>
                    <input type="text" th:field="*{copyrightLine}" placeholder="© 2026 Revolutionary Communists of Nigeria"
                           class="w-full rounded-md border border-rev-border bg-rev-subtle px-4 py-2 text-sm outline-none focus:border-rev-red">
                </div>
                <div>
                    <label class="mono-label block mb-2">Closing slogan</label>
                    <input type="text" th:field="*{closingSlogan}" placeholder="Workers of All Countries, Unite!"
                           class="w-full rounded-md border border-rev-border bg-rev-subtle px-4 py-2 text-sm outline-none focus:border-rev-red">
                </div>
            </div>

            <!-- Save -->
            <div class="mt-8 flex justify-end gap-3">
                <button type="submit" class="red-btn">Save Settings</button>
            </div>
        </form>

    </div>
</main>
</body>
</html>
