spring:
  datasource:
    url: ${JDBC_DATABASE_URL:jdbc:postgresql://localhost:5432/rcn}
    username: ${JDBC_DATABASE_USERNAME:postgres}
    password: ${JDBC_DATABASE_PASSWORD:rashy0207}
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          lob:
            non_contextual_creation: true
        id:
          new_generator_mappings: true
        types:
          print:
            banner: false
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  security:
    oauth2:
      client:
        provider:
          keycloak:
            issuer-uri: ${ISSUER_URI:https://ngcloak-production.up.railway.app/realms/rcn}

        registration:
          keycloak:
            provider: keycloak
            client_id: ${KEYCLOAK_CLIENT_ID:rcn}
            client_secret: ${KEYCLOAK_CLIENT_SECRET:1C4FXqRcKpzYpveIr7OGVH5nTpljjYFE}
            authorization-grant-type: authorization_code
            scope: openid,profile,email

# Keycloak Admin Client Configuration for CMS
keycloak:
  base-url: ${KEYCLOAK_BASE_URL:https://ngcloak-production.up.railway.app}
  realm: ${KEYCLOAK_REALM:rcn}
  base-realm: ${KEYCLOAK_BASE_REALM:master}
  admin-client-id: ${KEYCLOAK_ADMIN_CLIENT_ID:admin-cli}
  admin-client-secret: ${KEYCLOAK_ADMIN_CLIENT_SECRET:}
  client-id: ${KEYCLOAK_CLIENT_ID:rcn}
  client-secret: ${KEYCLOAK_CLIENT_SECRET:1C4FXqRcKpzYpveIr7OGVH5nTpljjYFE}

rcn:
  search:
    index-root: ${RCN_SEARCH_INDEX_ROOT:./data/search-index}
